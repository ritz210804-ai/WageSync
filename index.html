<script>
        // Production API Credentials
        const SUPABASE_URL = "https://prekvxsnuanvhunomqla.supabase.co"; 
        const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InByZWt2eHNudWFudmh1bm9tcWxhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQ1NjM1NjcsImV4cCI6MjEwMDEzOTU2N30.CoCEKUhPQL2j_-jthPyq16rM-_1p1ClIiNPBMkl6GaA";
        const n8n_WEBHOOK_URL = "";
        
        let supabase = null;
        if(SUPABASE_URL !== "") {
            supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        }

        let currentShiftId = null;
        let isPunchedIn = false;
        let smsLogStorage = [];

        async function handleWorkerPunch() {
            const actionBtn = document.getElementById('btn-punch-action');
            const statusTxt = document.getElementById('punch-status-text');
            const payTxt = document.getElementById('app-calculated-pay');

            if (!supabase) {
                alert("Database configuration not detected.");
                return;
            }

            if (!isPunchedIn) {
                actionBtn.innerText = "Transmitting...";
                
                // 1. Insert active Shift record node
                const { data: shift, error: se } = await supabase.from('shifts').insert([{
                    worker_id: 'a1b2c3d4-e5f6-7a8b-9c0d-1e2f3a4b5c6d',
                    worksite_id: 'c3b1a8d2-4e92-4148-963a-23945a0b7211',
                    shift_start: '08:00:00',
                    shift_end: '16:00:00',
                    daily_wage_rate: 720.00,
                    status: 'Active'
                }]).select().single();

                if(se) { 
                    console.error(se); 
                    alert("Supabase Error during Shift Log: " + se.message + "\nDetails: " + se.details);
                    actionBtn.innerText = "Punch In"; 
                    return; 
                }
                currentShiftId = shift.shift_id;

                // 2. Insert mapped live entry row element into the attendance log component
                const { error: ae } = await supabase.from('attendance').insert([{
                    shift_id: currentShiftId,
                    gps_verified: true,
                    status: 'Active'
                }]);

                if(ae) {
                    alert("Supabase Error during Attendance Log: " + ae.message);
                }

                smsLogStorage.unshift(`[WAGESYNC LOG] Shift tracking initialized at Bommasandra Unit B. Ledger instance verified via GPS node.`);

                statusTxt.innerText = "On Duty";
                statusTxt.className = "text-emerald-600 font-bold text-sm mt-0.5 animate-pulse";
                payTxt.innerText = "₹720.00";
                actionBtn.innerHTML = `<i data-lucide="log-out" class="w-3.5 h-3.5"></i> Punch Out`;
                actionBtn.className = "bg-rose-500 hover:bg-rose-600 text-white text-xs font-black px-4 py-2 rounded-lg shadow transition";
                isPunchedIn = true;
            } else {
                actionBtn.innerText = "Syncing...";
                
                await supabase.from('shifts').update({ status: 'Completed' }).eq('shift_id', currentShiftId);
                await supabase.from('attendance').update({ status: 'Completed' }).eq('shift_id', currentShiftId);
                
                smsLogStorage.unshift(`[WAGESYNC LOG] Shift entry completed. Accrued payout record locked: ₹720.00 base. Secure verification token sent.`);

                statusTxt.innerText = "Off Duty";
                statusTxt.className = "text-sm font-mono font-bold mt-0.5 text-slate-900";
                payTxt.innerText = "₹0.00";
                actionBtn.innerHTML = `<i data-lucide="power" class="w-3.5 h-3.5"></i> Punch In`;
                actionBtn.className = "bg-emerald-500 hover:bg-emerald-600 text-white text-xs font-black px-4 py-2 rounded-lg shadow transition";
                isPunchedIn = false;
            }
            fetchLiveDatabasePayloads();
            lucide.createIcons();
        }

        async function fetchLiveDatabasePayloads() {
            if(!supabase) return;
            const { data: logs, error } = await supabase.from('shifts').select('*').order('date', { ascending: false });
            if (error) {
                console.error(error);
                return;
            }
            
            const targetRows = document.getElementById('portal-ledger-rows');
            document.getElementById('active-workers-metric').innerText = `${logs.length} System Records`;
            targetRows.innerHTML = "";

            logs.forEach(row => {
                const tr = document.createElement('tr');
                tr.className = "border-b border-slate-800/50 hover:bg-slate-800/20 font-medium";
                tr.innerHTML = `
                    <td class="py-3 font-mono text-slate-400 text-[11px]">${row.shift_id.substring(0,8)}...</td>
                    <td class="py-3 font-bold text-slate-200">₹${row.daily_wage_rate}</td>
                    <td class="py-3 text-emerald-400">✓ GPS Confirmed</td>
                    <td class="py-3 text-right"><span class="px-2 py-0.5 rounded text-[10px] font-bold ${row.status === 'Active' ? 'bg-blue-950 text-blue-400 border border-blue-900 animate-pulse' : 'bg-emerald-950 text-emerald-400 border border-emerald-900'}">${row.status.toUpperCase()}</span></td>
                `;
                targetRows.appendChild(tr);
            });
        }

        function openSubScreen(type) {
            const box = document.getElementById('app-sub-screen');
            const inner = document.getElementById('sub-screen-content');
            box.classList.remove('hidden');

            if(type === 'ai-assistant') {
                inner.innerHTML = `
                    <div class="flex flex-col h-full justify-between space-y-2">
                        <p class="font-bold text-purple-950 text-[11px] uppercase flex items-center gap-1"><i data-lucide="bot" class="w-3.5 h-3.5"></i> AI Assistant Engine</p>
                        <div class="bg-slate-100 p-2 rounded text-[11px] border border-slate-200 font-medium text-slate-800">
                            "Hello! Ask me about your attendance history, shift tracking data, or minimum wage transparency validations."
                        </div>
                        <div class="flex gap-1">
                            <input id="ai-input" type="text" placeholder="Type question (Kannada / Hindi)..." class="border border-slate-300 rounded px-2 py-1 flex-1 text-[11px] focus:outline-none">
                            <button onclick="processAiQuestion()" class="bg-purple-600 text-white px-3 py-1 rounded text-[11px] font-bold">Ask</button>
                        </div>
                    </div>
                `;
            } else if(type === 'sms-logs') {
                inner.innerHTML = `
                    <p class="font-bold text-amber-950 text-[11px] uppercase mb-2 flex items-center gap-1"><i data-lucide="smartphone" class="w-3.5 h-3.5"></i> SMS Notification Ledger Logs</p>
                    <div class="space-y-1.5 max-h-[120px] overflow-y-auto">
                        ${smsLogStorage.length === 0 ? '<p class="text-slate-400 italic font-medium">No messages synchronized yet.</p>' : smsLogStorage.map(log => `<div class="bg-slate-950 text-emerald-400 p-2 rounded text-[10px] font-mono leading-normal shadow-sm border border-slate-800">${log}</div>`).join('')}
                    </div>
                `;
            }
            lucide.createIcons();
        }

        function processAiQuestion() {
            const input = document.getElementById('ai-input').value.toLowerCase();
            let response = "I couldn't locate specific record coordinates matching that query. Please request assistance using keyword variations.";
            
            if(input.includes('wage') || input.includes('pay') || input.includes('ದುಡ್ಡು')) {
                response = "WageSync database record check successful: Your daily standard profile rate is structured at standard legal compliance margins (₹720.00 / shift).";
            } else if(input.includes('overtime') || input.includes('ot')) {
                response = "Overtime parameters indicate automated compliance queuing. Shifts logs verify tracking matches active parameters.";
            }

            alert(`[WageSync Voice AI Engine]\n\n${response}`);
            document.getElementById('ai-input').value = "";
        }

        if(supabase) {
            fetchLiveDatabasePayloads();
            supabase.channel('table-db-changes').on('postgres_changes', { event: '*', schema: 'public', table: 'shifts' }, () => {
                fetchLiveDatabasePayloads();
            }).subscribe();
        }
        lucide.createIcons();
    </script>
